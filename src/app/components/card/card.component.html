@if (!pokemon) {
  <mat-card><mat-spinner></mat-spinner></mat-card>
} @else {
  <mat-card
    (click)="showDetail(pokemon.id)"
    class="pokemon-card"
    [class.hologram]="isLastEvolution"
    [style.background]="isLastEvolution ? '' : 'linear-gradient(180deg, ' + typeColor(pokemon.types[0]?.type?.name || 'normal') + '22 0%, #ffffff 70%)'"
  >
    @if (isLastEvolution) {
      <div class="hologram-overlay"></div>
    }
    <span class="pokemon-number">#{{ pokemon.id | number:'3.0-5' }}</span>
    <img
      [src]="pokemon.sprites.other?.['official-artwork']?.front_default || pokemon.sprites.front_default"
      [alt]="pokemon.name"
      loading="lazy"
      (error)="onImgError($event)"
    >
    <mat-card-content>
      <mat-card-title>{{ pokemon.name | titlecase }}</mat-card-title>
      <mat-chip-set>
        @for (type of pokemon.types; track type.slot) {
          <mat-chip [style.background]="typeColor(type.type.name)" style="color: white">
            {{ type.type.name | titlecase }}
          </mat-chip>
        }
      </mat-chip-set>
    </mat-card-content>
  </mat-card>
}
